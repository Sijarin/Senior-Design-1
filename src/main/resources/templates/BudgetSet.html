<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set Budget - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="budget-container">

                <button type="button" class="budget-btn" onclick="window.location.href='/dashboard'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
                <br><br>
                <h2>Set Your Budget For this Month- <span th:text="${currentMonth}">February 2026</span></h2>

                <form th:action="@{/budget}" method="POST">


                    <!-- Income Section -->
                    <div class="budget-section">
                        <h3>INCOME</h3>

                        <div class="budget-form-row">
                            <label for="monthlyIncome">Monthly Income</label>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" name="monthlyIncome" id="monthlyIncome" required>
                        </div>

                        <div class="budget-form-row">
                            <label for="otherIncome">Other Income</label>
                            <input type="text" inputmode="numeric" pattern="[0-9]*" name="otherIncome" id="otherIncome">
                        </div>
                    </div>

                    <!-- Fixed Expenses Section -->
                    <div class="budget-section">
                        <h3>Fixed Expenses</h3>

                        <table class="budget-table">
                            <tr>
                                <th>Category</th>
                                <th>Planned Amount</th>
                            </tr>
                            <tr>
                                <td>Rent / Mortgage</td>
                                <td><input type="text" inputmode="numeric" pattern="[0-9]*" name="rent"></td>
                            </tr>
                            <tr>
                                <td>Utilities</td>
                                <td><input type="text" inputmode="numeric" pattern="[0-9]*" name="utilities"></td>
                            </tr>
                            <tr>
                                <td>Insurance</td>
                                <td><input type="text" inputmode="numeric" pattern="[0-9]*" name="insurance"></td>
                            </tr>
                            <tr>
                                <td>Groceries</td>
                                <td><input type="text" inputmode="numeric" pattern="[0-9]*" name="groceries"></td>
                            </tr>
                            <tr>
                                <td>Subscriptions</td>
                                <td><input type="text" inputmode="numeric" pattern="[0-9]*" name="subscriptions"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- Variable Expenses Section -->
                    <div class="budget-section">
                        <h3>Miscellaneous Expenses</h3>

                        <table class="budget-table" id="variableTable">
                            <tr>
                                <th>Title</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </table>

                        <br>
                        <button type="button" class="budget-btn" onclick="addRow()">Add Expense</button>
                    </div>

                    <br>
                    <button type="submit" class="budget-btn">Save</button>

                </form>

        </div>

    <script>
        function addRow() {
            const table = document.getElementById("variableTable");
            const row = table.insertRow();

            const cell1 = row.insertCell(0);
            const cell2 = row.insertCell(1);
            const cell3 = row.insertCell(2);

            cell1.innerHTML = '<input type="text" name="variableTitle" required>';
            cell2.innerHTML = '<input type="text" inputmode="numeric" pattern="[0-9]*" name="variableAmount" placeholder="0" required>';
            cell3.innerHTML = '<button type="button" class="budget-btn remove-btn" onclick="removeRow(this)">X</button>';
        }

        function removeRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }


    </script>
</body>
</html>
