<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>FINVISION</h1>
            <p>Clarity in every Dollar</p>
        </div>

        <h2>Create Account</h2>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-group">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <div class ="form-group">
                <input type="text" name="securityQuestion" placeholder="Security Question" required>
            </div>
            <div class="form-group">
                <input type="text" name="securityAnswer" placeholder="Answer" required>
            </div>

            <button type="submit" class="btn-login">Create Account</button>
        </form>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>
        <div th:if="${message}" class="success-message" th:text="${message}"></div>

        <div class="links">
            <a th:href="@{/login}">Already have an account? Login</a>
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>
    </div>
</div>
<th:block th:replace="~{basetemplate :: darkMode}"></th:block>
</body>
</html>
