<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinVision Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside th:replace="~{basetemplate :: sidebar}"></aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- Top bar with profile -->
        <div class="topbar">
            <div></div> <!-- empty space for left -->
            <div class="profile-icon-wrapper">
                <div class="profile-icon">
                    <a th:href="@{/profile}">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <h2>Welcome Back, 👋</h2>
            <p>Your personalized financial command center.</p>
        </div>

        <!-- Video Demo Box -->
        <div class="card video-box">
            <h3>Demo Preview Area</h3>
            <p>You can embed or upload your demonstration walkthrough video here.</p>
            <div class="video-placeholder">
                <i class="fa-solid fa-video fa-3x"></i>
            </div>
        </div>

    </main>

</div>

<!-- CHATBOT BUTTON -->
<div class="chatbot-btn">
    <i class="fa-solid fa-robot"></i>
</div>

<script>
    // Hamburger toggle
    const menuToggle = document.querySelector('.menu-toggle');
    const navMenu = document.querySelector('.nav-menu');
    menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('show');
    });
</script>

</body>
</html>
