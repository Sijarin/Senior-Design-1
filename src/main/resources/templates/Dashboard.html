<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinVision Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-header">
            <span class="brand-text">Clarity in every Dollar</span>
            <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        </div>

        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="menu-item">Dashboard</a>
            <a th:href="@{/tracker}" class="menu-item">Tracker</a>
            <a th:href="@{/budget}" class="menu-item">Set Budget</a>
            <a th:href="@{/cashflow}" class="menu-item">Cash Flow</a>
            <a th:href="@{/reminders}" class="menu-item">Bill Reminders</a>
            <a th:href="@{/insights}" class="menu-item">Insights</a>
        </nav>

        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- Top bar with profile -->
        <div class="topbar">
            <div></div> <!-- empty space for left -->
            <div class="profile-icon-wrapper">
                <div class="profile-icon">
                    <a th:href="@{/profile}">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <h2>Welcome Back, 👋</h2>
            <p>Your personalized financial command center.</p>
        </div>

        <!-- Video Demo Box -->
        <div class="card video-box">
            <h3>Demo Preview Area</h3>
            <p>You can embed or upload your demonstration walkthrough video here.</p>
            <div class="video-placeholder">
                <i class="fa-solid fa-video fa-3x"></i>
            </div>
        </div>

    </main>

</div>

<!-- CHATBOT BUTTON -->
<div class="chatbot-btn">
    <i class="fa-solid fa-robot"></i>
</div>

<script>
    // Hamburger toggle
    const menuToggle = document.querySelector('.menu-toggle');
    const navMenu = document.querySelector('.nav-menu');
    menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('show');
    });
</script>

</body>
</html>
