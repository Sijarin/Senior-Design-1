<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>FINVISION</h1>
            <p>Clarity in every Dollar</p>
        </div>

        <h2>Login</h2>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <!-- Error / Success messages -->
        <div th:if="${param.error}" class="error-message">
            Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="success-message">
            You have been logged out successfully.
        </div>
        <div th:if="${param.registered}" class="success-message">
            Account created successfully! Please login.
        </div>

        <div class="links">
            <a th:href="@{/register}">Create Account</a>
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>
    </div>
</div>
</body>
</html>
