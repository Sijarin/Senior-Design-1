<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>FINVISION</h1>
            <p>Clarity in every Dollar</p>
        </div>

        <h2>Reset Password</h2>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
            </div>

            <div class="form-group">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required>
            </div>

            <button type="submit" class="btn-login">Reset Password</button>
        </form>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <div class="links">
            <a th:href="@{/login}">Back to Login</a>
            <a th:href="@{/register}">Create Account</a>
        </div>
    </div>
</div>
<th:block th:replace="~{basetemplate :: darkMode}"></th:block>
</body>
</html>
