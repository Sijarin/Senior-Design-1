<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Insights - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside th:replace="~{basetemplate :: sidebar}"></aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <div th:replace="~{basetemplate :: topbar}"></div>

        <h2>Monthly Insights</h2>

        <p>Total Income: $<span th:text="${income}"></span></p>
        <p>Total Expenses: $<span th:text="${expenses}"></span></p>
        <p>Remaining: $<span th:text="${remaining}"></span></p>

        <h3>Suggestions</h3>
        <ul>
            <li th:each="s : ${suggestions}" th:text="${s}"></li>
        </ul>

    </main>

</div>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navMenu = document.querySelector('.nav-menu');
    menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('show');
    });
</script>

<th:block th:replace="~{basetemplate :: darkMode}"></th:block>
</body>
</html>
