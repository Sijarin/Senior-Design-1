<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile Settings - FINVISION</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside th:replace="~{basetemplate :: sidebar}"></aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <div th:replace="~{basetemplate :: topbar}"></div>

        <div class="profile-container">
            <h1>Profile Settings</h1>

            <!-- Personal Information -->
            <section class="profile-card">
                <h2>Personal Information</h2>
                <form method="post" th:action="@{/profile/update}">
                    <label>Name:</label>
                    <input type="text" name="name" th:value="${user.name}" required>

                    <label>Email:</label>
                    <input type="email" name="email" th:value="${user.email}" required>

                    <label>Username:</label>
                    <input type="text" name="username" th:value="${user.username}" required>

                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </section>

            <!-- Security -->
            <section class="profile-card">
                <h2>Security</h2>
                <form method="post" th:action="@{/profile/password}">
                    <label>Current Password:</label>
                    <input type="password" name="currentPassword">

                    <label>New Password:</label>
                    <input type="password" name="newPassword">

                    <label>Confirm New Password:</label>
                    <input type="password" name="confirmPassword">

                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </section>

            <!-- Danger Zone -->
            <section class="profile-card danger-zone">
                <h2>Danger Zone</h2>
                <p>Deleting your account is permanent and cannot be undone.</p>
                <form method="post" th:action="@{/profile/delete}">
                    <button type="submit" class="btn-danger">Delete Account</button>
                </form>
            </section>
        </div>

    </main>

</div>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navMenu = document.querySelector('.nav-menu');
    menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('show');
    });
</script>

<th:block th:replace="~{basetemplate :: darkMode}"></th:block>
</body>
</html>
