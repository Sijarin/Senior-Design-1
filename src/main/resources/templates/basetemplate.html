<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="sidebar">

    <!-- ── Brand Logo ── -->
    <div class="sb-brand">
        <div class="sb-logo">
            <div class="sb-logo-icon"><i class="fa-solid fa-chart-line"></i></div>
            <div>
                <div class="sb-logo-text">FinVision</div>
                <span class="sb-logo-sub">Clarity in every dollar</span>
            </div>
        </div>
        <button class="menu-toggle" onclick="document.querySelector('.nav-menu').classList.toggle('show')">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <!-- ── User mini-profile ── -->
    <div class="sb-user" th:if="${displayName != null}">
        <img th:if="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
             th:src="${profilePhoto}" alt="Profile" class="sb-user-photo">
        <div th:unless="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
             class="sb-user-initial"
             th:text="${userInitial != null} ? ${userInitial} : 'U'">U</div>
        <div>
            <div class="sb-user-name" th:text="${displayName}">User</div>
            <div class="sb-user-role">Member</div>
        </div>
    </div>

    <!-- ── Navigation ── -->
    <nav class="nav-menu">

        <div class="sb-section-label">Main</div>

        <a th:href="@{/dashboard}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-house"></i></div>
            <span class="mi-text">Dashboard</span>
        </a>
        <a th:href="@{/budget}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-wallet"></i></div>
            <span class="mi-text">Set Budget</span>
        </a>
        <a th:href="@{/tracker}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-bullseye"></i></div>
            <span class="mi-text">Goal Tracking</span>
        </a>

        <div class="sb-section-label">Analytics</div>

        <a th:href="@{/predictive-cash-flow}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-chart-line"></i></div>
            <span class="mi-text">Predictive Cash Flow</span>
        </a>
        <a th:href="@{/alerts}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-bell"></i></div>
            <span class="mi-text">Alerts &amp; Notifications<span id="alerts-due-badge"></span></span>
        </a>
        <a th:href="@{/insights}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-brain"></i></div>
            <span class="mi-text">Insights</span>
        </a>
        <a th:href="@{/spending-visualization}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-chart-pie"></i></div>
            <span class="mi-text">Spending Visualization</span>
        </a>
        <a th:href="@{/receipt-scan}" class="menu-item">
            <div class="mi-icon"><i class="fa-solid fa-receipt"></i></div>
            <span class="mi-text">Actual Expense</span>
        </a>

    </nav>

    <!-- ── Footer / Logout ── -->
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="logout-btn">
            <div class="lb-icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
            <span>Logout</span>
        </a>
    </div>

    <!-- Active-page highlight -->
    <script>
    (function() {
        var path = window.location.pathname;
        document.querySelectorAll('.sidebar .menu-item').forEach(function(a) {
            var href = a.getAttribute('href') || '';
            if (href && path === href) a.classList.add('sb-active');
        });
    })();
    </script>

</aside>

<!-- Shared topbar: dark mode toggle + bell reminders + profile avatar -->
<div th:fragment="topbar" class="topbar">
    <div></div>
    <div class="topbar-right">
        <button id="darkModeToggle" class="topbar-dark-toggle">
            <i id="darkModeIcon" class="fa-solid fa-moon"></i>
        </button>

        <!-- Bill reminder bell -->
        <div class="topbar-bell-wrapper" id="bellWrapper">
            <button class="topbar-bell-btn" id="bellBtn" title="Bill Reminders">
                <i class="fa-solid fa-bell"></i>
                <span class="bell-badge" th:if="${bellCount != null and bellCount > 0}" th:text="${bellCount}"></span>
            </button>
            <div class="bell-dropdown" id="bellDropdown">
                <div class="bell-dropdown-header">
                    <span class="bell-dropdown-title">Bill Reminders</span>
                    <a th:href="@{/alerts}" class="bell-view-all">View All</a>
                </div>
                <div class="bell-dropdown-body">
                    <div th:if="${bellItems == null or #lists.isEmpty(bellItems)}" class="bell-empty">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>No upcoming bills due</span>
                    </div>
                    <div th:each="item : ${bellItems}"
                         class="bell-item"
                         th:classappend="${item.statusColor == 'red'} ? ' bell-item-overdue' : ' bell-item-soon'">
                        <div class="bell-item-icon">
                            <i class="fa-solid fa-file-invoice-dollar"></i>
                        </div>
                        <div class="bell-item-info">
                            <div class="bell-item-name" th:text="${item.name}">Bill Name</div>
                            <div class="bell-item-meta">
                                <span class="bell-item-amount" th:text="${item.amount}">$0.00</span>
                                <span class="bell-item-sep">·</span>
                                <span class="bell-item-due" th:text="${item.dueText}">Due today</span>
                            </div>
                        </div>
                        <span class="bell-status-pill"
                              th:classappend="${item.statusColor == 'red'} ? ' pill-red' : ' pill-yellow'"
                              th:text="${item.statusLabel}">Status</span>
                    </div>
                </div>
            </div>
        </div>

        <a th:href="@{/profile}" class="topbar-avatar-link" title="My Profile">
            <img th:if="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
                 th:src="${profilePhoto}" alt="Profile" class="topbar-avatar-img">
            <span th:unless="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
                  class="topbar-avatar-initials"
                  th:text="${userInitial != null} ? ${userInitial} : 'U'">U</span>
        </a>
    </div>
    <script th:inline="javascript">
    var _FV_BELL_USER = /*[[${loggedInUsername}]]*/ null;
    </script>
    <script>
    (function() {
        var btn = document.getElementById('bellBtn');
        var dropdown = document.getElementById('bellDropdown');
        if (!btn || !dropdown) return;
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('bell-open');
        });
        document.addEventListener('click', function(e) {
            var wrapper = document.getElementById('bellWrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                dropdown.classList.remove('bell-open');
            }
        });
    })();

    // Inject budget bills from localStorage into the bell
    (function() {
        if (!_FV_BELL_USER) return;
        var dueDates, paidStatus;
        try { dueDates  = JSON.parse(localStorage.getItem('fv_due_'  + _FV_BELL_USER) || '{}'); } catch(e) { dueDates  = {}; }
        try { paidStatus = JSON.parse(localStorage.getItem('fv_paid_' + _FV_BELL_USER) || '{}'); } catch(e) { paidStatus = {}; }

        var NAMES = { rent:'Rent', utilities:'Utilities', insurance:'Insurance',
                      groceries:'Groceries', subscriptions:'Subscriptions' };
        var today    = new Date();
        var todayDay = today.getDate();
        var items    = [];

        Object.keys(dueDates).forEach(function(id) {
            if (paidStatus[id]) return;
            var m = (dueDates[id] || '').match(/(\d+)/);
            if (!m) return;
            var dueDay    = parseInt(m[1]);
            var daysUntil = dueDay - todayDay;
            if (daysUntil > 7) return;
            var name       = NAMES[id] || id;
            var statusLabel = daysUntil < 0 ? 'Overdue' : 'Due Soon';
            var statusColor = daysUntil < 0 ? 'red' : 'yellow';
            var dueText    = daysUntil < 0
                ? 'Overdue by ' + (-daysUntil) + ' day' + (-daysUntil === 1 ? '' : 's')
                : daysUntil === 0 ? 'Due today'
                : 'Due in ' + daysUntil + ' day' + (daysUntil === 1 ? '' : 's');
            items.push({ name: name, dueText: dueText, statusLabel: statusLabel, statusColor: statusColor });
        });

        if (items.length === 0) return;

        var body = document.querySelector('#bellDropdown .bell-dropdown-body');
        if (!body) return;

        var emptyDiv = body.querySelector('.bell-empty');
        if (emptyDiv) emptyDiv.remove();

        items.forEach(function(b) {
            var div = document.createElement('div');
            div.className = 'bell-item ' + (b.statusColor === 'red' ? 'bell-item-overdue' : 'bell-item-soon');
            div.innerHTML =
                '<div class="bell-item-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div>' +
                '<div class="bell-item-info">' +
                    '<div class="bell-item-name">' + b.name + '</div>' +
                    '<div class="bell-item-meta"><span class="bell-item-due">' + b.dueText + '</span></div>' +
                '</div>' +
                '<span class="bell-status-pill ' + (b.statusColor === 'red' ? 'pill-red' : 'pill-yellow') + '">' + b.statusLabel + '</span>';
            body.appendChild(div);
        });

        // Update badge count
        var bellBtn = document.getElementById('bellBtn');
        var badge   = bellBtn ? bellBtn.querySelector('.bell-badge') : null;
        var current = badge ? (parseInt(badge.textContent) || 0) : 0;
        var total   = current + items.length;
        if (badge) {
            badge.textContent = total;
        } else if (bellBtn) {
            var nb = document.createElement('span');
            nb.className = 'bell-badge';
            nb.textContent = total;
            bellBtn.appendChild(nb);
        }
    })();
    </script>
</div>

    <!-- ── JavaScript ── -->
    <script th:inline="javascript">
    /*<![CDATA[*/
    var FV_CHAT_USER = /*[[${loggedInUsername}]]*/ 'guest';
    /*]]>*/
    </script>
    <script>
    (function() {
        var open      = false;
        var voiceOut  = true;
        var listening = false;
        var recognition = null;

        // ── Goal tracking: read from localStorage and format response ──
        var GOAL_KEYS = ['goal', 'target', 'goal tracking', 'my goals', 'show goals',
                         'emergency fund', 'retirement', 'savings goal', 'financial goal',
                         'debt payoff', 'vacation fund', 'home down', 'investment fund'];
        function isGoalMsg(msg) {
            var m = msg.toLowerCase();
            return GOAL_KEYS.some(function(k) { return m.includes(k); });
        }

        function fvGoalResponse() {
            var key   = 'fv_goals_' + FV_CHAT_USER;
            var raw   = localStorage.getItem(key);
            var goals = raw ? JSON.parse(raw) : [];

            var CAT_LABELS = {
                emergency:'Emergency Fund', retirement:'Retirement Savings',
                house:'Home Down Payment', vacation:'Vacation Fund', debt:'Debt Payoff',
                education:'Education', car:'Car / Vehicle', investment:'Investment Fund', custom:'Custom Goal'
            };

            if (!goals || goals.length === 0) {
                return "\uD83C\uDFAF No goals set yet.\nVisit **Goal Tracking** in the sidebar to add your first financial goal!";
            }

            var totalSaved  = goals.reduce(function(s, g) { return s + Number(g.saved  || 0); }, 0);
            var totalTarget = goals.reduce(function(s, g) { return s + Number(g.target || 0); }, 0);
            var overallPct  = totalTarget > 0 ? Math.round((totalSaved / totalTarget) * 100) : 0;

            var lines = [];
            lines.push("\uD83C\uDFAF **Your Goal Tracking Overview**");
            lines.push("\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501");
            lines.push("\uD83D\uDCCA **TOTALS**");
            lines.push("\u2022 Active Goals:     **" + goals.length + "**");
            lines.push("\u2022 Total Saved:      **$" + totalSaved.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + "**");
            lines.push("\u2022 Total Target:     $" + totalTarget.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}));
            lines.push("\u2022 Overall Progress: **" + overallPct + "%**");
            lines.push("\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501");
            lines.push("");
            lines.push("\uD83C\uDFC6 **YOUR GOALS**");

            goals.forEach(function(g, i) {
                var saved  = Number(g.saved  || 0);
                var target = Number(g.target || 0);
                var pct    = target > 0 ? Math.min(Math.round((saved / target) * 100), 100) : 0;
                var left   = Math.max(target - saved, 0);
                var badge  = pct >= 100 ? '\uD83C\uDF89 Completed'
                           : pct >= 75  ? '\uD83D\uDD25 Almost There'
                           : pct >= 40  ? '\uD83D\uDCC8 On Track'
                           : '\uD83D\uDE80 Getting Started';
                var catLabel = CAT_LABELS[g.category] || 'Goal';

                lines.push((i + 1) + ". **" + (g.name || 'Unnamed') + "**  [" + catLabel + "]");
                lines.push("   Saved: $" + saved.toLocaleString('en-US', {minimumFractionDigits:2}) +
                           " / $" + target.toLocaleString('en-US', {minimumFractionDigits:2}) +
                           "  \u00B7  " + pct + "%");
                lines.push("   $" + left.toLocaleString('en-US', {minimumFractionDigits:2}) + " remaining  \u00B7  " + badge);
                if (g.date) lines.push("   \uD83D\uDCC5 Target Date: " + g.date);
                lines.push("");
            });

            lines.push("\uD83D\uDC49 Visit **Goal Tracking** in the sidebar to add funds or create new goals.");

                var interim = '';
                var final_  = '';
                for (var i = e.resultIndex; i < e.results.length; i++) {
                    var transcript = e.results[i][0].transcript;
                    if (e.results[i].isFinal) {
                        // Pick the alternative with highest confidence
                        var best = e.results[i][0];
                        for (var j = 1; j < e.results[i].length; j++) {
                            if (e.results[i][j].confidence > best.confidence) best = e.results[i][j];
                        }
                        final_ += best.transcript;
                    } else {
                        interim += transcript;
                    }
                }
                // Show live interim text in the input field
                if (interim) inputEl.value = interim;
                if (final_) {
                    inputEl.value = final_;
                    inputEl.placeholder = savedPlaceholder;
                }
            };

            recognition.onend = function() {
                listening = false;
                updateMic();
                inputEl.placeholder = savedPlaceholder;
                // If there's text in the input after recognition ends, send it
                if (inputEl.value.trim()) fvSend();
            };

            recognition.onerror = function(e) {
                listening = false;
                updateMic();
                inputEl.placeholder = savedPlaceholder;
                var msgs = {
                    'no-speech':       '\uD83C\uDFA4 No speech detected. Try speaking louder or closer to the mic.',
                    'not-allowed':     '\uD83D\uDEAB Microphone access denied. Please allow microphone in your browser settings.',
                    'network':         '\uD83D\uDEF0\uFE0F Network error. Check your connection and try again.',
                    'audio-capture':   '\uD83C\uDFA4 No microphone found. Please connect one and try again.',
                    'aborted':         null
                };
                var m = msgs[e.error];
                if (m) addMsg(m, 'bot');
            };

            recognition.start();
            listening = true;
            addMsg("\uD83C\uDFA4 Listening... speak your question!", 'bot');
            updateMic();
        };

        function updateMic() {
            var btn = document.getElementById('fvMicBtn');
            if (!btn) return;
            btn.classList.toggle('fv-listening', listening);
            btn.querySelector('i').className = listening
                ? 'fa-solid fa-microphone-slash'
                : 'fa-solid fa-microphone';
        }

        // ── Voice Output ──
        window.fvToggleVoiceOut = function() {
            voiceOut = !voiceOut;
            if (!voiceOut && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            var btn = document.getElementById('fvVoiceOutBtn');
            if (btn) btn.style.color = voiceOut ? '#4facfe' : '';
            addMsg(voiceOut
                ? "\uD83D\uDD0A Voice responses ON \u2014 I'll read my answers aloud."
                : "\uD83D\uDD07 Voice responses OFF.", 'bot');
        };

        function fvSpeak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            var clean = text
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/[•\u2022]/g, '')
                .replace(/\n/g, '. ');
            var u = new SpeechSynthesisUtterance(clean);
            u.lang  = 'en-US';
            u.rate  = 0.95;
            u.pitch = 1.05;
            window.speechSynthesis.speak(u);
        }
    })();
    </script>

    <script>
    (function() {
        var badge = document.getElementById('alerts-due-badge');
        if (!badge) return;
        try {
            var user  = typeof FV_CHAT_USER !== 'undefined' ? FV_CHAT_USER : 'guest';
            var dates = JSON.parse(localStorage.getItem('fv_due_'  + user) || '{}');
            var paid  = JSON.parse(localStorage.getItem('fv_paid_' + user) || '{}');
            var today = new Date().getDate();
            var count = Object.keys(dates).filter(function(id) {
                if (paid[id]) return false;
                var m = dates[id] && dates[id].match(/(\d+)/);
                return m && parseInt(m[1]) === today;
            }).length;
            badge.textContent = count > 0 ? '(' + count + ')' : '';
        } catch(e) { badge.textContent = ''; }
    })();
    </script>

    <script th:src="@{/js/darkmode.js}"></script>
</th:block>
