<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="sidebar">

    <div class="sidebar-header">
        <span class="brand-text">Clarity in every Dollar</span>
        <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
    </div>

    <nav class="nav-menu">
        <a th:href="@{/dashboard}" class="menu-item">Dashboard</a>
        <a th:href="@{/budget}" class="menu-item">Set Budget</a>
        <a th:href="@{/tracker}" class="menu-item">Goal Tracking</a>
        <a th:href="@{/predictive-cash-flow}" class="menu-item">Predictive Cash Flow</a>
        <a th:href="@{/alerts}" class="menu-item">Alerts &amp; Notifications</a>
        <a th:href="@{/insights}" class="menu-item">Insights</a>
        <a th:href="@{/spending-visualization}" class="menu-item">Spending Visualization</a>
        <a th:href="@{/receipt-scan}" class="menu-item">Receipt Scanner</a>
    </nav>

    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </a>
    </div>

</aside>

<!-- Shared topbar: dark mode toggle + profile avatar -->
<div th:fragment="topbar" class="topbar">
    <div></div>
    <div class="topbar-right">
        <button id="darkModeToggle" class="topbar-dark-toggle">
            <i id="darkModeIcon" class="fa-solid fa-moon"></i>
        </button>
        <a th:href="@{/profile}" class="topbar-avatar-link" title="My Profile">
            <img th:if="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
                 th:src="${profilePhoto}" alt="Profile" class="topbar-avatar-img">
            <span th:unless="${profilePhoto != null and !#strings.isEmpty(profilePhoto)}"
                  class="topbar-avatar-initials"
                  th:text="${userInitial != null} ? ${userInitial} : 'U'">U</span>
        </a>
    </div>
</div>

<th:block th:fragment="darkMode">

    <!-- ══════════════════════════════════════
         FINVISION AI CHATBOT — injected on every page via darkMode fragment
         ══════════════════════════════════════ -->
    <div id="fvChatPanel" class="fv-chat-panel">

        <!-- Header -->
        <div class="fv-chat-header">
            <div class="fv-chat-avatar"><i class="fa-solid fa-robot"></i></div>
            <div class="fv-chat-info">
                <div class="fv-chat-name">FinVision AI</div>
                <div class="fv-chat-status"><span class="fv-status-dot"></span> Online</div>
            </div>
            <div class="fv-header-actions">
                <button class="fv-hdr-btn" id="fvVoiceOutBtn" onclick="fvToggleVoiceOut()" title="Toggle voice responses">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <button class="fv-hdr-btn" onclick="fvClose()" title="Close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="fv-messages" id="fvMessages"></div>

        <!-- Typing indicator -->
        <div class="fv-typing" id="fvTyping" style="display:none;">
            <span class="fv-t-dot"></span><span class="fv-t-dot"></span><span class="fv-t-dot"></span>
        </div>

        <!-- Suggestion chips -->
        <div class="fv-chips">
            <button class="fv-chip" onclick="fvChip('What is my income?')">My income</button>
            <button class="fv-chip" onclick="fvChip('Show my expenses')">My expenses</button>
            <button class="fv-chip" onclick="fvChip('Budget health')">Budget health</button>
            <button class="fv-chip" onclick="fvChip('Give me financial advice')">Tips</button>
        </div>

        <!-- Input -->
        <div class="fv-input-row">
            <input id="fvInput" class="fv-input" type="text"
                   placeholder="Ask me anything..."
                   onkeydown="if(event.key==='Enter') fvSend()">
            <button class="fv-mic-btn" id="fvMicBtn" onclick="fvToggleMic()" title="Voice input">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <button class="fv-send-btn" onclick="fvSend()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ── Styles ── -->
    <style>
        /* Upgrade existing chatbot-btn to show AI badge */
        .chatbot-btn { position: relative !important; cursor: pointer !important; }
        .fv-ai-badge {
            position: absolute; top: -5px; right: -5px;
            background: linear-gradient(135deg,#f5576c,#f093fb);
            color: #fff; font-size: 0.5rem; font-weight: 900;
            border-radius: 50px; padding: 2px 5px;
            letter-spacing: 0.3px; pointer-events: none;
        }

        /* ── Chat Panel ── */
        .fv-chat-panel {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 440px;
            background: linear-gradient(170deg, #0d0b1e 0%, #1a1535 50%, #0f1a3a 100%);
            border-radius: 24px 0 0 24px;
            box-shadow: -8px 0 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(102,126,234,0.18);
            display: flex; flex-direction: column; overflow: hidden;
            z-index: 99999;
            transform: translateX(100%);
            pointer-events: none;
            transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
        }
        .fv-chat-panel.fv-open {
            transform: translateX(0); pointer-events: all;
        }

        /* Header */
        .fv-chat-header {
            display: flex; align-items: center; gap: 0.8rem;
            padding: 0.95rem 1.1rem;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .fv-chat-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(102,126,234,0.45);
        }
        .fv-chat-name { font-size: 0.92rem; font-weight: 800; color: #fff; }
        .fv-chat-status {
            font-size: 0.68rem; color: rgba(255,255,255,0.55);
            display: flex; align-items: center; gap: 0.3rem; margin-top: 1px;
        }
        .fv-status-dot {
            width: 7px; height: 7px; border-radius: 50%; background: #38ef7d;
            box-shadow: 0 0 6px #38ef7d;
            animation: fv-pulse 2s ease-in-out infinite;
        }
        @keyframes fv-pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
        .fv-header-actions { margin-left: auto; display: flex; gap: 0.35rem; }
        .fv-hdr-btn {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: none;
            color: rgba(255,255,255,0.55); font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .fv-hdr-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* Messages */
        .fv-messages {
            flex: 1; overflow-y: auto; padding: 1rem 1rem 0.5rem;
            display: flex; flex-direction: column; gap: 0.7rem;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent;
        }
        .fv-messages::-webkit-scrollbar { width: 3px; }
        .fv-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .fv-msg { display: flex; }
        .fv-msg-user { justify-content: flex-end; }
        .fv-msg-bot  { justify-content: flex-start; }
        .fv-bubble {
            max-width: 82%; padding: 0.75rem 1rem;
            border-radius: 16px; font-size: 0.88rem; line-height: 1.6;
            word-wrap: break-word;
        }
        .fv-msg-user .fv-bubble {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: #fff; border-bottom-right-radius: 4px;
        }
        .fv-msg-bot .fv-bubble {
            background: rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.9);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Typing */
        .fv-typing {
            display: flex; gap: 5px; padding: 0.4rem 1rem; align-items: center;
        }
        .fv-t-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(255,255,255,0.45);
            animation: fv-bounce 1.3s ease-in-out infinite;
            display: inline-block;
        }
        .fv-t-dot:nth-child(2) { animation-delay: 0.18s; }
        .fv-t-dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes fv-bounce { 0%,80%,100%{transform:scale(0.75);opacity:0.4} 40%{transform:scale(1.15);opacity:1} }

        /* Chips */
        .fv-chips {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            padding: 0.4rem 0.9rem 0;
        }
        .fv-chip {
            padding: 0.28rem 0.75rem;
            border: 1px solid rgba(102,126,234,0.4);
            border-radius: 50px;
            background: rgba(102,126,234,0.1);
            color: rgba(255,255,255,0.75);
            font-size: 0.72rem; cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .fv-chip:hover { background: rgba(102,126,234,0.35); color: #fff; }

        /* Input row */
        .fv-input-row {
            display: flex; gap: 0.45rem;
            padding: 0.75rem 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .fv-input {
            flex: 1; padding: 0.6rem 0.9rem;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px; color: #fff;
            font-size: 0.83rem; outline: none;
            transition: border-color 0.2s;
        }
        .fv-input::placeholder { color: rgba(255,255,255,0.35); }
        .fv-input:focus { border-color: rgba(102,126,234,0.6); }
        .fv-mic-btn, .fv-send-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; color: #fff; font-size: 0.82rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s;
        }
        .fv-mic-btn  { background: linear-gradient(135deg,#667eea,#764ba2); }
        .fv-send-btn { background: linear-gradient(135deg,#4facfe,#00f2fe); }
        .fv-mic-btn:hover, .fv-send-btn:hover { transform: scale(1.1); }
        .fv-mic-btn.fv-listening {
            background: linear-gradient(135deg,#f5576c,#f093fb) !important;
            animation: fv-pulse-btn 1s ease-in-out infinite;
        }
        @keyframes fv-pulse-btn { 0%,100%{box-shadow:0 0 0 0 rgba(245,87,108,0.5)} 50%{box-shadow:0 0 0 8px rgba(245,87,108,0)} }

        /* Mobile */
        @media (max-width: 480px) {
            .fv-chat-panel { width: 100vw; border-radius: 0; }
        }
    </style>

    <!-- ── JavaScript ── -->
    <script>
    (function() {
        var open      = false;
        var voiceOut  = false;
        var listening = false;
        var recognition = null;

        // ── Hook existing chatbot button ──
        var btn = document.querySelector('.chatbot-btn');
        if (btn) {
            // Add AI badge
            var badge = document.createElement('span');
            badge.className = 'fv-ai-badge';
            badge.textContent = 'AI';
            btn.appendChild(badge);
            btn.addEventListener('click', toggle);
        }

        function toggle() {
            open = !open;
            var panel = document.getElementById('fvChatPanel');
            panel.classList.toggle('fv-open', open);
            if (open) {
                if (document.getElementById('fvMessages').children.length === 0) {
                    addMsg("Hi there! \uD83D\uDC4B I'm FinVision AI — your personal finance assistant.\n\nI know your budget, savings, spending, and account info. Ask me anything, or try the suggestion buttons below!\n\nType 'help' to see all commands. I also support \uD83C\uDFA4 voice input!", 'bot');
                }
                setTimeout(function() { document.getElementById('fvInput').focus(); }, 50);
            }
        }

        window.fvClose = function() {
            open = false;
            document.getElementById('fvChatPanel').classList.remove('fv-open');
        };

        window.fvChip = function(text) {
            document.getElementById('fvInput').value = text;
            fvSend();
        };

        // ── Add message bubble ──
        function addMsg(text, sender) {
            var container = document.getElementById('fvMessages');
            var wrap = document.createElement('div');
            wrap.className = 'fv-msg fv-msg-' + sender;
            var bubble = document.createElement('div');
            bubble.className = 'fv-bubble';
            // Escape HTML, then format
            var html = text
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
                .replace(/\n/g,'<br>');
            bubble.innerHTML = html;
            wrap.appendChild(bubble);
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        // ── Send message ──
        window.fvSend = async function() {
            var input = document.getElementById('fvInput');
            var msg   = input.value.trim();
            if (!msg) return;
            addMsg(msg, 'user');
            input.value = '';

            var typing = document.getElementById('fvTyping');
            typing.style.display = 'flex';
            document.getElementById('fvMessages').scrollTop = 99999;

            try {
                var res  = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                var data = await res.json();
                typing.style.display = 'none';
                addMsg(data.response, 'bot');
                if (voiceOut) fvSpeak(data.response);
            } catch(e) {
                typing.style.display = 'none';
                addMsg("Sorry, I couldn't connect. Please try again.", 'bot');
            }
        };

        // ── Voice Input ──
        window.fvToggleMic = function() {
            var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                addMsg("Voice input isn't supported in your browser. Try Chrome or Edge.", 'bot');
                return;
            }
            if (!recognition) {
                recognition = new SR();
                recognition.continuous     = false;
                recognition.interimResults = false;
                recognition.lang           = 'en-US';
                recognition.onresult = function(e) {
                    var t = e.results[0][0].transcript;
                    document.getElementById('fvInput').value = t;
                    fvSend();
                };
                recognition.onend  = function() { listening = false; updateMic(); };
                recognition.onerror = function() { listening = false; updateMic(); };
            }
            if (listening) {
                recognition.stop();
            } else {
                recognition.start();
                listening = true;
                addMsg("\uD83C\uDFA4 Listening... speak now!", 'bot');
            }
            updateMic();
        };

        function updateMic() {
            var btn = document.getElementById('fvMicBtn');
            if (!btn) return;
            btn.classList.toggle('fv-listening', listening);
            btn.querySelector('i').className = listening
                ? 'fa-solid fa-microphone-slash'
                : 'fa-solid fa-microphone';
        }

        // ── Voice Output ──
        window.fvToggleVoiceOut = function() {
            voiceOut = !voiceOut;
            var btn = document.getElementById('fvVoiceOutBtn');
            if (btn) btn.style.color = voiceOut ? '#4facfe' : '';
            addMsg(voiceOut
                ? "\uD83D\uDD0A Voice responses ON \u2014 I'll read my answers aloud."
                : "\uD83D\uDD07 Voice responses OFF.", 'bot');
        };

        function fvSpeak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            var clean = text
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/[•\u2022]/g, '')
                .replace(/\n/g, '. ');
            var u = new SpeechSynthesisUtterance(clean);
            u.lang  = 'en-US';
            u.rate  = 0.95;
            u.pitch = 1.05;
            window.speechSynthesis.speak(u);
        }
    })();
    </script>

    <script th:src="@{/js/darkmode.js}"></script>
</th:block>

</body>
</html>
